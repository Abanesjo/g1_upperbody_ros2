g1_bridge_node:
  ros__parameters:
    gains:
      # Gains matching RL training config (from g1_constants.py motor specs)
      # Legs: 7520_14 (hip pitch/yaw), 7520_22 (hip roll/knee), dual 5020 (ankle)
      left_hip_pitch_joint:    {kp: 40.2,  kd: 2.6}
      left_hip_roll_joint:     {kp: 99.1,  kd: 6.3}
      left_hip_yaw_joint:      {kp: 40.2,  kd: 2.6}
      left_knee_joint:         {kp: 99.1,  kd: 6.3}
      left_ankle_pitch_joint:  {kp: 28.5,  kd: 1.8}
      left_ankle_roll_joint:   {kp: 28.5,  kd: 1.8}
      right_hip_pitch_joint:   {kp: 40.2,  kd: 2.6}
      right_hip_roll_joint:    {kp: 99.1,  kd: 6.3}
      right_hip_yaw_joint:     {kp: 40.2,  kd: 2.6}
      right_knee_joint:        {kp: 99.1,  kd: 6.3}
      right_ankle_pitch_joint: {kp: 28.5,  kd: 1.8}
      right_ankle_roll_joint:  {kp: 28.5,  kd: 1.8}
      # Waist: 7520_14 (yaw), dual 5020 (roll/pitch)
      waist_yaw_joint:         {kp: 40.2,  kd: 2.6}
      waist_roll_joint:        {kp: 28.5,  kd: 1.8}
      waist_pitch_joint:       {kp: 28.5,  kd: 1.8}
      # Arms: 5020 (shoulder/elbow/wrist_roll), 4010 (wrist pitch/yaw)
      left_shoulder_pitch_joint:  {kp: 14.3,  kd: 0.9}
      left_shoulder_roll_joint:   {kp: 14.3,  kd: 0.9}
      left_shoulder_yaw_joint:    {kp: 14.3,  kd: 0.9}
      left_elbow_joint:           {kp: 14.3,  kd: 0.9}
      left_wrist_roll_joint:      {kp: 14.3,  kd: 0.9}
      left_wrist_pitch_joint:     {kp: 16.8,  kd: 1.1}
      left_wrist_yaw_joint:       {kp: 16.8,  kd: 1.1}
      right_shoulder_pitch_joint: {kp: 14.3,  kd: 0.9}
      right_shoulder_roll_joint:  {kp: 14.3,  kd: 0.9}
      right_shoulder_yaw_joint:   {kp: 14.3,  kd: 0.9}
      right_elbow_joint:          {kp: 14.3,  kd: 0.9}
      right_wrist_roll_joint:     {kp: 14.3,  kd: 0.9}
      right_wrist_pitch_joint:    {kp: 16.8,  kd: 1.1}
      right_wrist_yaw_joint:      {kp: 16.8,  kd: 1.1}
