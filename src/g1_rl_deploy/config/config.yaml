# G1 Joint Index Map (motor_state[i] / motor_cmd[i] in LowState/LowCmd)
#
#  0  left_hip_pitch       *  6  right_hip_pitch      *
#  1  left_hip_roll        *  7  right_hip_roll       *
#  2  left_hip_yaw         *  8  right_hip_yaw        *
#  3  left_knee            *  9  right_knee           *
#  4  left_ankle_pitch     * 10  right_ankle_pitch    *
#  5  left_ankle_roll      * 11  right_ankle_roll     *
#
# 12  waist_yaw            D
# 13  waist_roll            C
# 14  waist_pitch           C
#
# 15  left_shoulder_pitch   C  22  right_shoulder_pitch  C
# 16  left_shoulder_roll    C  23  right_shoulder_roll   C
# 17  left_shoulder_yaw     D  24  right_shoulder_yaw    D
# 18  left_elbow            C  25  right_elbow           C
# 19  left_wrist_roll       D  26  right_wrist_roll      D
# 20  left_wrist_pitch      D  27  right_wrist_pitch     D
# 21  left_wrist_yaw        D  28  right_wrist_yaw       D
#
# * = lower body (12) — controlled by RL policy via /lower_body_commands
# C = upper body (8)  — controlled by CBF via /upper_body_targets
# D = default hold (9) — held at default positions by joint_merger

g1_rl_deploy_node:
  ros__parameters:
    model_path: /workspace/ros2_ws/install/g1_rl_deploy/share/g1_rl_deploy/models/policy.onnx

    # Timing
    control_dt: 0.02        # 50 Hz policy inference
    standup_duration: 3.0   # seconds to interpolate to home pose
    gait_period: 0.6        # phase oscillator period (seconds)

    # Velocity command limits
    cmd_vel_limits:
      lin_vel_x: [-0.5, 1.0]
      lin_vel_y: [-0.5, 0.5]
      ang_vel_z: [-1.0, 1.0]

    # Default joint positions (home pose) — all 29 DOF
    default_joint_pos: [-0.1, 0.0, 0.0, 0.3, -0.2, 0.0,     # left leg
                        -0.1, 0.0, 0.0, 0.3, -0.2, 0.0,      # right leg
                         0.0, 0.0, 0.0,                        # waist
                         0.35, 0.18, 0.0, 0.87, 0.0, 0.0, 0.0, # left arm
                         0.35,-0.18, 0.0, 0.87, 0.0, 0.0, 0.0] # right arm

    # Per-joint action scale — 12 lower body joints only
    action_scale: [0.55, 0.35, 0.55, 0.35, 0.44, 0.44,   # left leg
                   0.55, 0.35, 0.55, 0.35, 0.44, 0.44]    # right leg
