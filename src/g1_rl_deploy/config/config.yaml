# G1 Joint Index Map (motor_state[i] / motor_cmd[i] in LowState/LowCmd)
#
#  0  left_hip_pitch          6  right_hip_pitch
#  1  left_hip_roll           7  right_hip_roll
#  2  left_hip_yaw            8  right_hip_yaw
#  3  left_knee               9  right_knee
#  4  left_ankle_pitch       10  right_ankle_pitch
#  5  left_ankle_roll        11  right_ankle_roll
#
# 12  waist_yaw
# 13  waist_roll           U
# 14  waist_pitch          U
#
# 15  left_shoulder_pitch  U  22  right_shoulder_pitch  U
# 16  left_shoulder_roll   U  23  right_shoulder_roll   U
# 17  left_shoulder_yaw        24  right_shoulder_yaw
# 18  left_elbow           U  25  right_elbow           U
# 19  left_wrist_roll          26  right_wrist_roll
# 20  left_wrist_pitch         27  right_wrist_pitch
# 21  left_wrist_yaw           28  right_wrist_yaw
#
# All 29 joints controlled by RL policy via /joint_commands
# U = upper body (8) — CBF-filtered targets fed as observation to policy

g1_rl_deploy_node:
  ros__parameters:
    model_path: /workspace/ros2_ws/install/g1_rl_deploy/share/g1_rl_deploy/models/policy.onnx

    # Timing
    control_dt: 0.02        # 50 Hz policy inference
    standup_duration: 3.0   # seconds to interpolate to home pose
    gait_period: 0.6        # phase oscillator period (seconds)

    # Velocity command limits
    cmd_vel_limits:
      lin_vel_x: [-0.5, 1.0]
      lin_vel_y: [-0.5, 0.5]
      ang_vel_z: [-1.0, 1.0]

    # Default joint positions (home pose) — all 29 DOF
    default_joint_pos: [-0.1, 0.0, 0.0, 0.3, -0.2, 0.0,     # left leg
                        -0.1, 0.0, 0.0, 0.3, -0.2, 0.0,      # right leg
                         0.0, 0.0, 0.0,                        # waist
                         0.35, 0.18, 0.0, 0.87, 0.0, 0.0, 0.0, # left arm
                         0.35,-0.18, 0.0, 0.87, 0.0, 0.0, 0.0] # right arm

    # Per-joint action scale — all 29 joints (0.25 * effort_limit / stiffness)
    action_scale: [0.5475, 0.3507, 0.5475, 0.3507, 0.4386, 0.4386,   # left leg
                   0.5475, 0.3507, 0.5475, 0.3507, 0.4386, 0.4386,   # right leg
                   0.5475, 0.4386, 0.4386,                             # waist
                   0.4386, 0.4386, 0.4386, 0.4386, 0.4386, 0.0745, 0.0745, # left arm
                   0.4386, 0.4386, 0.4386, 0.4386, 0.4386, 0.0745, 0.0745] # right arm
